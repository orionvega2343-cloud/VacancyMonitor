services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: build/Dockerfile
    depends_on:
      - redis
    env_file:
      - ../.env
    restart: unless-stopped

volumes:
  redis_data: